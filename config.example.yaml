# Example configuration for onedrive-provisioner.
# All keys can also be supplied via environment variables (see .env.example).
azure:
  tenant_id: "00000000-0000-0000-0000-000000000000"
  client_id: "00000000-0000-0000-0000-000000000000"
  # Use ONE of the following:
  client_secret: "replace-me"
  # cert_path: "C:/secrets/graph-app.pem"
  # cert_thumbprint: "ABCDEF0123456789ABCDEF0123456789ABCDEF01"

upload:
  # Local source folder OR azure-blob URL (https://<acct>.blob.core.windows.net/<container>/<prefix>)
  source: "./samples/payload"
  # Destination path in each user's OneDrive (root-relative)
  destination: "Onboarding"
  chunk_size_mb: 10
  large_file_threshold_mb: 4

execution:
  concurrency: 8
  max_retries: 6
  dry_run: false

users:
  # Provide UPNs/object IDs inline OR via --users-file
  list:
    - alice@contoso.onmicrosoft.com
    - bob@contoso.onmicrosoft.com
  # Set true to fetch *all* tenant members (filtered to userType=Member, accountEnabled=true)
  all_users: false

reporting:
  output_dir: "./reports"
  formats: ["json", "csv"]
