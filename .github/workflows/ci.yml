name: Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: platform
          push: false
          tags: hackathon-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      HAS_AZURE_DEPLOY_CONFIG: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_APP_NAME != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip deploy when Azure configuration is missing
        if: env.HAS_AZURE_DEPLOY_CONFIG != 'true'
        run: echo "Azure deployment is skipped because required secrets/variables are not configured."
      - uses: azure/login@v2
        if: env.HAS_AZURE_DEPLOY_CONFIG == 'true'
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/webapps-deploy@v3
        if: env.HAS_AZURE_DEPLOY_CONFIG == 'true'
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          startup-command: "gunicorn app:app -c gunicorn.conf.py"
